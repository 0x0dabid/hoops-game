<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏀 HOOPS — 3D Street Basketball</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{overflow:hidden;background:#0a0a12;font-family:'Barlow Condensed',sans-serif;user-select:none;-webkit-user-select:none}
  canvas{display:block}

  #ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}

  #hud{
    position:absolute;top:20px;left:50%;transform:translateX(-50%);
    display:flex;gap:28px;align-items:center;
    background:rgba(0,0,0,.5);padding:8px 28px;border-radius:30px;backdrop-filter:blur(10px)
  }
  .hi{text-align:center}
  .hl{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.35);font-weight:600}
  .hv{font-family:'Bebas Neue',sans-serif;font-size:42px;color:#fff;line-height:1}
  .hd{width:1px;height:32px;background:rgba(255,255,255,.1)}

  #pw{position:absolute;bottom:55px;left:50%;transform:translateX(-50%);width:240px;opacity:0;transition:opacity .2s}
  #pw.on{opacity:1}
  #pt{width:100%;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
  #pf{height:100%;width:0%;border-radius:3px;background:linear-gradient(90deg,#00e676,#ffea00,#ff3d00)}
  #pl{text-align:center;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:4px}

  #ins{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.2);white-space:nowrap}

  #title{
    position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at center,#1a1020 0%,#0a0a12 70%);
    transition:opacity .6s,visibility .6s
  }
  #title.hide{opacity:0;visibility:hidden;pointer-events:none}
  #title h1{font-family:'Bebas Neue';font-size:clamp(50px,11vw,120px);color:#fff;letter-spacing:6px;text-shadow:0 0 50px rgba(255,140,0,.3)}
  #title h1 span{color:#ff8c00}
  #title .sub{font-size:13px;letter-spacing:5px;text-transform:uppercase;color:rgba(255,255,255,.25);margin-top:4px}
  #pbtn{
    margin-top:40px;padding:12px 50px;font-family:'Bebas Neue';font-size:22px;letter-spacing:5px;
    color:#fff;background:linear-gradient(135deg,#ff6b00,#ff8c00);border:none;border-radius:4px;
    cursor:pointer;pointer-events:auto;transition:transform .2s,box-shadow .2s;
    box-shadow:0 4px 30px rgba(255,140,0,.3);display:none
  }
  #pbtn:hover{transform:scale(1.05);box-shadow:0 4px 50px rgba(255,140,0,.5)}
  #ltxt{margin-top:16px;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.3)}

  .sp{
    position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);
    font-family:'Bebas Neue';font-size:72px;pointer-events:none;
    animation:pu 1s forwards;text-shadow:0 0 40px currentColor;z-index:20
  }
  @keyframes pu{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}
    20%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}
    40%{transform:translate(-50%,-50%) scale(1)}
    100%{opacity:0;transform:translate(-50%,-65%) scale(1)}
  }

  #stk{
    position:absolute;top:78px;left:50%;transform:translateX(-50%);
    font-family:'Bebas Neue';font-size:24px;color:#ff8c00;letter-spacing:4px;
    opacity:0;transition:opacity .3s;text-shadow:0 0 20px rgba(255,140,0,.5)
  }
  #stk.on{opacity:1}
</style>
</head>
<body>

<div id="title">
  <h1><span>🏀</span> HOOPS</h1>
  <div class="sub">3D Street Basketball</div>
  <button id="pbtn">PLAY</button>
  <div id="ltxt">Loading models...</div>
</div>

<div id="ui">
  <div id="hud">
    <div class="hi"><div class="hl">Score</div><div class="hv" id="vs">0</div></div>
    <div class="hd"></div>
    <div class="hi"><div class="hl">Shots</div><div class="hv" id="vt">0</div></div>
    <div class="hd"></div>
    <div class="hi"><div class="hl">Pct</div><div class="hv" id="vp">0%</div></div>
  </div>
  <div id="stk"></div>
  <div id="pw"><div id="pl">Power</div><div id="pt"><div id="pf"></div></div></div>
  <div id="ins">CLICK & HOLD to charge · RELEASE to shoot · MOVE to aim</div>
</div>

<script type="importmap">
{"imports":{
  "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- DOM ---
const $ = id => document.getElementById(id);
const vsEl=$('vs'), vtEl=$('vt'), vpEl=$('vp'), stkEl=$('stk');
const pwEl=$('pw'), pfEl=$('pf'), titleEl=$('title'), pbtnEl=$('pbtn'), ltxtEl=$('ltxt');

// --- STATE ---
let score=0, shots=0, streak=0;
let ball, player, court;
let inFlight=false, vel=new THREE.Vector3();
const G=new THREE.Vector3(0,-9.8,0);
let charging=false, chargeT=0;
let mx=0, my=0, scored=false, started=false;
const HOOP=new THREE.Vector3(0, 3.05, -6);

// --- SCENE ---
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0d0d1a);
scene.fog=new THREE.FogExp2(0x0d0d1a, 0.012);

const cam=new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 300);
cam.position.set(0, 4, 12);

const ren=new THREE.WebGLRenderer({antialias:true});
ren.setSize(innerWidth, innerHeight);
ren.setPixelRatio(Math.min(devicePixelRatio, 2));
ren.shadowMap.enabled=true;
ren.shadowMap.type=THREE.PCFSoftShadowMap;
ren.toneMapping=THREE.ACESFilmicToneMapping;
ren.toneMappingExposure=1.3;
document.body.insertBefore(ren.domElement, document.body.firstChild);

// --- LIGHTS ---
scene.add(new THREE.AmbientLight(0x606080, 0.7));
const sun=new THREE.DirectionalLight(0xfff0e0, 1.2);
sun.position.set(8,20,10); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=0.5; sun.shadow.camera.far=60;
sun.shadow.camera.left=-20; sun.shadow.camera.right=20;
sun.shadow.camera.top=20; sun.shadow.camera.bottom=-20;
scene.add(sun);
scene.add(new THREE.DirectionalLight(0x8090ff, 0.3));
const spot=new THREE.SpotLight(0xff8c00, 2, 30, Math.PI/5, 0.5);
spot.position.set(0,14,-5); spot.target.position.set(0,3,-6);
scene.add(spot); scene.add(spot.target);

// --- FLOOR ---
const fl=new THREE.Mesh(new THREE.PlaneGeometry(60,60), new THREE.MeshStandardMaterial({color:0x1a1a2e, roughness:0.9}));
fl.rotation.x=-Math.PI/2; fl.receiveShadow=true; scene.add(fl);

// --- BASKETBALL ---
{
  const g=new THREE.SphereGeometry(0.24, 32, 32);
  const c=document.createElement('canvas'); c.width=c.height=256;
  const x=c.getContext('2d');
  x.fillStyle='#e87a20'; x.fillRect(0,0,256,256);
  x.strokeStyle='#2a1a0a'; x.lineWidth=3;
  x.beginPath(); x.moveTo(0,128); x.lineTo(256,128); x.stroke();
  x.beginPath(); x.moveTo(128,0); x.lineTo(128,256); x.stroke();
  x.beginPath(); x.arc(128,128,80,0,Math.PI*2); x.stroke();
  ball=new THREE.Mesh(g, new THREE.MeshStandardMaterial({map:new THREE.CanvasTexture(c), roughness:0.7, metalness:0.05}));
  ball.castShadow=true; scene.add(ball);
}

function resetBall(){
  ball.position.set(0, 2.2, 5.5);
  vel.set(0,0,0); inFlight=false; scored=false;
}
resetBall();

// --- HOOP ---
{
  const rim=new THREE.Mesh(new THREE.TorusGeometry(0.45,0.025,16,32), new THREE.MeshStandardMaterial({color:0xff4500,metalness:0.8,roughness:0.3}));
  rim.rotation.x=Math.PI/2; rim.position.copy(HOOP); rim.castShadow=true; scene.add(rim);
  const bb=new THREE.Mesh(new THREE.BoxGeometry(1.8,1.2,0.05), new THREE.MeshStandardMaterial({color:0xffffff,transparent:true,opacity:0.45,roughness:0.1}));
  bb.position.set(HOOP.x, HOOP.y+0.5, HOOP.z-0.5); scene.add(bb);
  const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.06,HOOP.y+0.9,8), new THREE.MeshStandardMaterial({color:0x888888,metalness:0.9,roughness:0.2}));
  pole.position.set(HOOP.x, (HOOP.y+0.9)/2, HOOP.z-0.55); scene.add(pole);
  const net=new THREE.Mesh(new THREE.CylinderGeometry(0.45,0.25,0.6,12,4,true), new THREE.MeshBasicMaterial({color:0xffffff,wireframe:true,transparent:true,opacity:0.35}));
  net.position.set(HOOP.x, HOOP.y-0.35, HOOP.z); scene.add(net);
}

// --- LOAD MODELS ---
const ldr=new GLTFLoader();
let nLoaded=0;
function modelDone(){ nLoaded++; if(nLoaded>=2){ ltxtEl.textContent='Ready!'; pbtnEl.style.display='block'; } }

ldr.load('court.glb', gltf=>{
  court=gltf.scene;
  const b=new THREE.Box3().setFromObject(court);
  const sz=new THREE.Vector3(); b.getSize(sz);
  const cn=new THREE.Vector3(); b.getCenter(cn);
  court.scale.setScalar(25/Math.max(sz.x,sz.y,sz.z));
  b.setFromObject(court); b.getCenter(cn);
  court.position.sub(cn);
  b.setFromObject(court); court.position.y-=b.min.y;
  court.traverse(c=>{if(c.isMesh){c.receiveShadow=true;c.castShadow=true;}});
  scene.add(court);
  ltxtEl.textContent='Court loaded...';
  modelDone();
}, p=>{if(p.total) ltxtEl.textContent='Court '+Math.round(p.loaded/p.total*100)+'%';},
  ()=>{ltxtEl.textContent='Court skipped'; modelDone();});

ldr.load('player.glb', gltf=>{
  player=gltf.scene;
  const b=new THREE.Box3().setFromObject(player);
  const sz=new THREE.Vector3(); b.getSize(sz);
  const cn=new THREE.Vector3(); b.getCenter(cn);
  player.scale.setScalar(1.4/sz.y);
  b.setFromObject(player); b.getCenter(cn);
  player.position.sub(cn);
  b.setFromObject(player); player.position.y-=b.min.y;
  player.position.z=6;
  player.rotation.y=Math.PI;
  player.traverse(c=>{if(c.isMesh){c.castShadow=true;c.receiveShadow=true;}});
  scene.add(player);
  ltxtEl.textContent='Player loaded...';
  modelDone();
}, p=>{if(p.total) ltxtEl.textContent='Player '+Math.round(p.loaded/p.total*100)+'%';},
  ()=>{ltxtEl.textContent='Player skipped'; modelDone();});

// --- START ---
pbtnEl.addEventListener('click', ()=>{ titleEl.classList.add('hide'); started=true; });

// --- INPUT ---
function dn(){ if(!started||inFlight) return; charging=true; chargeT=Date.now(); pwEl.classList.add('on'); }
function up(){ if(!charging) return; charging=false; pwEl.classList.remove('on'); shoot(); }
function mv(x,y){ mx=(x/innerWidth)*2-1; my=-(y/innerHeight)*2+1; }

window.addEventListener('mousedown', dn);
window.addEventListener('mouseup', up);
window.addEventListener('mousemove', e=>mv(e.clientX, e.clientY));
window.addEventListener('touchstart', e=>{e.preventDefault(); mv(e.touches[0].clientX, e.touches[0].clientY); dn();}, {passive:false});
window.addEventListener('touchend', e=>{e.preventDefault(); up();});
window.addEventListener('touchmove', e=>{e.preventDefault(); mv(e.touches[0].clientX, e.touches[0].clientY);}, {passive:false});

function shoot(){
  if(inFlight) return;
  inFlight=true; shots++; vtEl.textContent=shots;
  const pwr=Math.min((Date.now()-chargeT)/1200, 1);
  const ax=mx*2;
  const s=ball.position.clone(), t=HOOP.clone();
  t.x+=ax*0.3;
  const dx=t.x-s.x, dy=t.y-s.y, dz=t.z-s.z;
  const dist=Math.sqrt(dx*dx+dz*dz);
  const spd=7+pwr*6;
  const ang=Math.atan2(dy+2.5, dist);
  const vh=spd*Math.cos(ang), vv=spd*Math.sin(ang);
  const dir=Math.atan2(dz, dx);
  vel.set(vh*Math.cos(dir), vv+2.5, vh*Math.sin(dir));
  ball.userData.spin=new THREE.Vector3((Math.random()-.5)*4, 0, -6);
  if(player){player.rotation.x=-0.15; setTimeout(()=>{if(player) player.rotation.x=0;}, 400);}
}

function chkScore(){
  if(scored) return;
  const p=ball.position;
  const dx=p.x-HOOP.x, dz=p.z-HOOP.z;
  const dH=Math.sqrt(dx*dx+dz*dz);
  if(dH<0.4 && Math.abs(p.y-HOOP.y)<0.3 && vel.y<0){
    scored=true;
    const pts=streak>=3?3:2;
    score+=pts; streak++;
    vsEl.textContent=score;
    vpEl.textContent=Math.min(shots>0?Math.round(score/(shots*2)*100):0, 100)+'%';
    pop(true, pts);
    if(streak>=2){stkEl.textContent='🔥 '+streak+' STREAK'; stkEl.classList.add('on');}
  }
}

function pop(made, pts){
  const el=document.createElement('div'); el.className='sp';
  if(made){el.textContent=streak>=3?'🔥 SWISH! +'+pts:'NICE! +'+pts; el.style.color='#ff8c00';}
  else{el.textContent='MISS'; el.style.color='rgba(255,255,255,.25)'; streak=0; stkEl.classList.remove('on');}
  $('ui').appendChild(el); setTimeout(()=>el.remove(), 1000);
}

// --- RESIZE ---
window.addEventListener('resize', ()=>{cam.aspect=innerWidth/innerHeight; cam.updateProjectionMatrix(); ren.setSize(innerWidth, innerHeight);});

// --- LOOP ---
const clk=new THREE.Clock();
!function loop(){
  requestAnimationFrame(loop);
  const dt=Math.min(clk.getDelta(), 0.05);

  if(charging) pfEl.style.width=(Math.min((Date.now()-chargeT)/1200,1)*100)+'%';

  if(inFlight && inFlight!=='done'){
    vel.addScaledVector(G, dt);
    ball.position.addScaledVector(vel, dt);
    if(ball.userData.spin){ball.rotation.x+=ball.userData.spin.x*dt; ball.rotation.z+=ball.userData.spin.z*dt;}
    chkScore();

    // Floor
    if(ball.position.y<0.24){ball.position.y=0.24; vel.y=-vel.y*0.5; vel.x*=0.8; vel.z*=0.8; if(Math.abs(vel.y)<0.3) vel.y=0;}
    // Backboard
    if(ball.position.z<HOOP.z-0.3 && ball.position.z>HOOP.z-0.7 && Math.abs(ball.position.x-HOOP.x)<0.9 && ball.position.y>HOOP.y-0.3 && ball.position.y<HOOP.y+1.1){vel.z=Math.abs(vel.z)*0.6; ball.position.z=HOOP.z-0.25;}
    // Rim
    const rx=ball.position.x-HOOP.x, rz=ball.position.z-HOOP.z, rd=Math.sqrt(rx*rx+rz*rz);
    if(rd>0.35 && rd<0.55 && Math.abs(ball.position.y-HOOP.y)<0.3){
      const nx=rx/rd, nz=rz/rd, d=vel.x*nx+vel.z*nz;
      vel.x-=1.4*d*nx; vel.z-=1.4*d*nz; vel.y*=0.7;
    }
    // Reset
    if((ball.position.y<=0.25 && vel.length()<0.4) || ball.position.y<-5 || Math.abs(ball.position.z)>25){
      if(!scored) pop(false,0);
      inFlight='done'; setTimeout(resetBall, 600);
    }
  } else if(!inFlight){
    ball.position.y=2.2+Math.sin(Date.now()*0.004)*0.04;
    ball.position.x=mx*0.3;
    if(player) player.position.x+=(mx*0.3-player.position.x)*0.05;
  }

  cam.position.x+=(mx*1.2-cam.position.x)*0.03;
  cam.lookAt(0, 2.5, 0);
  ren.render(scene, cam);
}();
</script>
</body>
</html>
